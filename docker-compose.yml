services:
  # Ambiente di sviluppo con hot-reload (make up)
  dev:
    build:
      context: .
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev

  # Anteprima della build di produzione servita da nginx (make preview)
  prod:
    build:
      context: .
      target: prod
      args:
        VITE_BASE: /
    ports:
      - "8080:80"
    profiles:
      - prod
